<body>

<div class="header">
ABC Hotel Menu
</div>

<div class="container">

<div class="category">🍛 Main Dishes</div>

<div class="item">
<span>Chicken Momo — Rs 180</span>
<button onclick="addToCart('Chicken Momo',180)">Add</button>
</div>

<div class="item">
<span>Veg Thali — Rs 350</span>
<button onclick="addToCart('Veg Thali',350)">Add</button>
</div>

<div class="item">
<span>Fried Rice — Rs 200</span>
<button onclick="addToCart('Fried Rice',200)">Add</button>
</div>

<div class="category">🥤 Drinks</div>

<div class="item">
<span>Tea — Rs 40</span>
<button onclick="addToCart('Tea',40)">Add</button>
</div>

<div class="item">
<span>Coffee — Rs 80</span>
<button onclick="addToCart('Coffee',80)">Add</button>
</div>

<div class="item">
<span>Chatpat — Rs 80</span>
<button onclick="addToCart('Chatpat',80)">Add</button>
</div>

</div>

<div class="cart">
<h3>Your Order</h3>

<ul id="cartList"></ul>

<h4>Total: Rs <span id="total">0</span></h4>

<input type="number" id="tableNumber" placeholder="Enter Table Number">

<button class="place-btn" onclick="placeOrder()">Place Order via WhatsApp</button>

<button class="cancel-btn" onclick="cancelOrder()">Cancel Order</button>

</div>

<div class="footer">
Scan → Add → Edit → Order
</div>

<script>

let cart = {};

function addToCart(item, price){
if(cart[item]){
cart[item].qty += 1;
} else {
cart[item] = {price: price, qty: 1};
}
renderCart();
}

function increase(item){
cart[item].qty += 1;
renderCart();
}

function decrease(item){
cart[item].qty -= 1;
if(cart[item].qty <= 0){
delete cart[item];
}
renderCart();
}

function removeItem(item){
delete cart[item];
renderCart();
}

function cancelOrder(){
cart = {};
renderCart();
document.getElementById("tableNumber").value = "";
}

function renderCart(){

let cartList = document.getElementById("cartList");
cartList.innerHTML = "";
let total = 0;

cartList.style.display = "flex";
cartList.style.flexWrap = "wrap";
cartList.style.gap = "10px";
cartList.style.listStyle = "none";
cartList.style.padding = "0";

for(let item in cart){

let price = cart[item].price;
let qty = cart[item].qty;
let itemTotal = price * qty;
total += itemTotal;

let li = document.createElement("li");

li.style.background = "#f8f8f8";
li.style.padding = "10px";
li.style.borderRadius = "8px";
li.style.width = "200px";
li.style.boxShadow = "0 2px 5px rgba(0,0,0,0.1)";

li.innerHTML = `
<strong>${item}</strong><br>
Rs ${price} × ${qty} = Rs ${itemTotal}
<br><br>
<button onclick="increase('${item}')">+</button>
<button onclick="decrease('${item}')">-</button>
<button onclick="removeItem('${item}')">Remove</button>
`;

cartList.appendChild(li);
}

document.getElementById("total").textContent = total;
}
function placeOrder(){

let table = document.getElementById("tableNumber").value;

if(Object.keys(cart).length === 0){
alert("Cart is empty!");
return;
}

if(table === ""){
alert("Please enter table number!");
return;
}

// 🔥 ADD BOTH NUMBERS HERE
let phoneNumbers = 
"9779713375594"  // Kitchen    
;

let message = "🍽 New Order\n";
message += "Table: " + table + "\n\n";

let total = 0;

for(let item in cart){
let price = cart[item].price;
let qty = cart[item].qty;
let itemTotal = price * qty;
total += itemTotal;

message += item + " x" + qty + " = Rs " + itemTotal + "\n";
}

message += "\nTotal: Rs " + total;

// 🔥 Encode once
let encodedMessage = encodeURIComponent(message);

// 🔥 Send to both numbers
// phoneNumbers.forEach(function(phone){
let url = "https://wa.me/" + phoneNumbers + "?text=" + encodedMessage;
window.open(url, "_blank");
// });

// Clear cart after sending
cancelOrder();
}




</script>

</body>
